<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a1a2e">
<title>Remote PC Controller</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
:root{--bg:#1a1a2e;--card:#16213e;--accent:#0f3460;--highlight:#e94560;--text:#eee;--dim:#888}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;font-size:16px}
body{display:flex;flex-direction:column;padding:6px;gap:6px}
.top-bar{display:flex;align-items:center;gap:8px;padding:6px 10px;background:var(--card);border-radius:12px}
.top-bar input{flex:1;background:var(--accent);border:none;color:var(--text);padding:10px 14px;border-radius:8px;font-size:15px;outline:none}
.top-bar button{background:var(--highlight);color:#fff;border:none;padding:10px 18px;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer}
.status{font-size:12px;color:var(--dim);white-space:nowrap;min-width:12px;height:12px;width:12px;border-radius:50%;background:var(--dim);display:inline-block}
.status.on{background:#4caf50}
.joystick-area{flex:1;display:flex;align-items:center;justify-content:center;position:relative;background:var(--card);border-radius:16px;min-height:180px;overflow:hidden}
.joystick-base{width:160px;height:160px;border-radius:50%;background:rgba(255,255,255,.07);border:2px solid rgba(255,255,255,.12);position:relative}
.joystick-knob{width:64px;height:64px;border-radius:50%;background:var(--highlight);position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);box-shadow:0 0 20px rgba(233,69,96,.4);pointer-events:none}
.controls{display:flex;flex-direction:column;gap:6px}
.row{display:flex;gap:6px;justify-content:center}
.btn{background:var(--card);border:2px solid var(--accent);color:var(--text);border-radius:12px;font-size:18px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;user-select:none;-webkit-user-select:none;transition:background .1s}
.btn:active,.btn.pressed{background:var(--highlight);border-color:var(--highlight)}
.btn-lg{flex:1;height:58px}
.btn-md{flex:1;height:50px;font-size:16px}
.btn-sm{width:64px;height:50px;font-size:14px}
.btn-wasd{width:58px;height:50px}
.scroll-row .btn{flex:1;height:50px;font-size:22px}
.wpad{width:58px;height:50px;visibility:hidden}
</style>
<script>
const manifest={name:"Remote PC Controller",short_name:"RemotePC",start_url:".",display:"standalone",background_color:"#1a1a2e",theme_color:"#1a1a2e",icons:[{src:"data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🖥️</text></svg>",sizes:"512x512",type:"image/svg+xml"}]};
const mlink=document.createElement("link");mlink.rel="manifest";mlink.href=URL.createObjectURL(new Blob([JSON.stringify(manifest)],{type:"application/json"}));document.head.appendChild(mlink);
</script>
</head>
<body>
<div class="top-bar">
  <span class="status" id="status"></span>
  <input id="ipInput" type="text" placeholder="Server IP (e.g. 192.168.1.100)" inputmode="numeric" pattern="[0-9.]*">
  <button id="connectBtn">Connect</button>
</div>

<div class="joystick-area" id="joystickArea">
  <div class="joystick-base" id="joystickBase">
    <div class="joystick-knob" id="joystickKnob"></div>
  </div>
</div>

<div class="controls">
  <div class="row">
    <button class="btn btn-lg" data-action="click" data-button="left">Left Click</button>
    <button class="btn btn-lg" data-action="click" data-button="right">Right Click</button>
  </div>
  <div class="row">
    <div class="wpad"></div>
    <button class="btn btn-wasd" data-action="key" data-key="w">W</button>
    <div class="wpad"></div>
    <button class="btn btn-sm" data-action="key" data-key=" ">SPC</button>
    <button class="btn btn-sm" data-action="key" data-key="escape">ESC</button>
    <button class="btn btn-sm" data-action="click" data-button="middle">MID</button>
  </div>
  <div class="row">
    <button class="btn btn-wasd" data-action="key" data-key="a">A</button>
    <button class="btn btn-wasd" data-action="key" data-key="s">S</button>
    <button class="btn btn-wasd" data-action="key" data-key="d">D</button>
    <button class="btn btn-sm" data-action="key" data-key="enter">ENT</button>
    <button class="btn btn-sm" data-action="key" data-key="shift">SHF</button>
    <button class="btn btn-sm" data-action="key" data-key="ctrl">CTL</button>
  </div>
  <div class="row">
    <button class="btn btn-wasd" data-action="key" data-key="up">↑</button>
    <button class="btn btn-wasd" data-action="key" data-key="left">←</button>
    <button class="btn btn-wasd" data-action="key" data-key="down">↓</button>
    <button class="btn btn-wasd" data-action="key" data-key="right">→</button>
    <button class="btn btn-sm" data-action="key" data-key="tab">TAB</button>
    <button class="btn btn-sm" data-action="key" data-key="alt">ALT</button>
    <button class="btn btn-sm" data-action="key" data-key="backspace">DEL</button>
  </div>
  <div class="row scroll-row">
    <button class="btn" data-action="scroll" data-dy="5">Scroll Up</button>
    <button class="btn" data-action="scroll" data-dy="-5">Scroll Down</button>
  </div>
</div>

<script>
let ws=null,connected=false;
const $=s=>document.querySelector(s);const $$=s=>document.querySelectorAll(s);
const ipInput=$("#ipInput"),connectBtn=$("#connectBtn"),statusDot=$("#status");

ipInput.value=localStorage.getItem("remotePC_ip")||"";

function send(msg){if(ws&&ws.readyState===WebSocket.OPEN)ws.send(JSON.stringify(msg))}

function connect(){
  const ip=ipInput.value.trim();
  if(!ip)return;
  localStorage.setItem("remotePC_ip",ip);
  if(ws)ws.close();
  ws=new WebSocket(`ws://${ip}:8765/ws`);
  ws.onopen=()=>{connected=true;statusDot.classList.add("on");connectBtn.textContent="Connected"};
  ws.onclose=()=>{connected=false;statusDot.classList.remove("on");connectBtn.textContent="Connect"};
  ws.onerror=()=>{statusDot.classList.remove("on");connectBtn.textContent="Retry"};
}
connectBtn.onclick=connect;
ipInput.addEventListener("keydown",e=>{if(e.key==="Enter")connect()});

$$("[data-action]").forEach(btn=>{
  const action=btn.dataset.action;
  const handleStart=e=>{e.preventDefault();btn.classList.add("pressed")};
  const handleEnd=e=>{
    e.preventDefault();btn.classList.remove("pressed");
    if(action==="click")send({action:"click",button:btn.dataset.button});
    else if(action==="key")send({action:"key",key:btn.dataset.key});
    else if(action==="scroll")send({action:"scroll",dy:parseInt(btn.dataset.dy)});
  };
  btn.addEventListener("touchstart",handleStart,{passive:false});
  btn.addEventListener("touchend",handleEnd,{passive:false});
  btn.addEventListener("touchcancel",handleEnd,{passive:false});
  btn.addEventListener("mousedown",handleStart);
  btn.addEventListener("mouseup",handleEnd);
  btn.addEventListener("mouseleave",handleEnd);
});

const joystickBase=$("#joystickBase"),joystickKnob=$("#joystickKnob"),joystickArea=$("#joystickArea");
let joyTouch=null,joyCenter={x:0,y:0},sending=false;

function joyStart(touch){
  joyTouch=touch.identifier;
  const rect=joystickBase.getBoundingClientRect();
  joyCenter={x:rect.left+rect.width/2,y:rect.top+rect.height/2};
  if(!sending){sending=true;joyLoop()}
}
function joyMove(cx,cy){
  let dx=cx-joyCenter.x,dy=cy-joyCenter.y;
  const maxR=70,dist=Math.sqrt(dx*dx+dy*dy);
  if(dist>maxR){dx=dx/dist*maxR;dy=dy/dist*maxR}
  joystickKnob.style.transform=`translate(calc(-50% + ${dx}px),calc(-50% + ${dy}px))`;
  const sens=2.5;
  send({action:"move",dx:dx/maxR*sens,dy:dy/maxR*sens});
}
function joyEnd(){
  joyTouch=null;joystickKnob.style.transform="translate(-50%,-50%)";
}
function joyLoop(){
  if(joyTouch!==null)requestAnimationFrame(joyLoop);
  else sending=false;
}

joystickArea.addEventListener("touchstart",e=>{
  e.preventDefault();
  if(joyTouch===null)joyStart(e.changedTouches[0]);
},{passive:false});
joystickArea.addEventListener("touchmove",e=>{
  e.preventDefault();
  for(const t of e.changedTouches){if(t.identifier===joyTouch){joyMove(t.clientX,t.clientY);break}}
},{passive:false});
joystickArea.addEventListener("touchend",e=>{
  for(const t of e.changedTouches){if(t.identifier===joyTouch){joyEnd();break}}
},{passive:false});
joystickArea.addEventListener("touchcancel",e=>{joyEnd()},{passive:false});

let mouseDown=false,lastMouse={x:0,y:0};
joystickArea.addEventListener("mousedown",e=>{mouseDown=true;lastMouse={x:e.clientX,y:e.clientY}});
joystickArea.addEventListener("mousemove",e=>{
  if(!mouseDown)return;
  send({action:"move",dx:(e.clientX-lastMouse.x)*1.5,dy:(e.clientY-lastMouse.y)*1.5});
  lastMouse={x:e.clientX,y:e.clientY};
});
joystickArea.addEventListener("mouseup",()=>mouseDown=false);
joystickArea.addEventListener("mouseleave",()=>mouseDown=false);
</script>
</body>
</html>
